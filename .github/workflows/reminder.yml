name: Rubbish Day Reminder

on:
  # schedule:
  #   - cron: "0 21 * * *"
  #     timezone: "Pacific/Auckland"

  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run reminder check
        env:
          SUBSCRIPTIONS: ${{ secrets.SUBSCRIPTIONS }}
        run: node lib/check-reminders.js
